services:
  - type: web
    name: exam-portal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_KEY
        sync: false
    # Uncomment below if you add a paid plan and want visitor/attempt
    # data to survive restarts and deploys (see README "Persistence" section).
    # disk:
    #   name: exam-portal-data
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1
